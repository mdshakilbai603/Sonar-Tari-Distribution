<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সোনার তরী ডিস্ট্রিবিউশন | Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        
        /* প্রফেশনাল স্লাইডার */
        .slider-container { width: 100%; height: 210px; position: relative; overflow: hidden; border-radius: 15px; background: #ddd; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* বটম নেভিগেশন (Ghorerbazar Style) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #f97316; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; }
        .nav-item { color: white; text-align: center; font-size: 10px; flex: 1; text-decoration: none; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 2px; }

        .search-container { position: sticky; top: 0; z-index: 500; background: white; padding: 12px; border-bottom: 1px solid #eee; }
        .card { background: white; border-radius: 15px; border: 1px solid #efefef; transition: 0.3s; position: relative; }
        #admin-modal { display: none; }
    </style>
</head>
<body>

    <header class="bg-white p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-orange-600 text-white w-8 h-8 flex items-center justify-center rounded-lg font-bold">ST</div>
            <h1 class="text-xl font-bold text-gray-800">সোনার তরী</h1>
        </div>
        <div class="flex gap-4 items-center">
            <i class="fas fa-search text-gray-500" onclick="document.getElementById('searchInput').focus()"></i>
            <div class="relative">
                <i class="fas fa-shopping-basket text-xl text-gray-700"></i>
                <span class="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] px-1.5 rounded-full">0</span>
            </div>
        </div>
    </header>

    <div class="search-container">
        <div class="relative flex items-center bg-gray-100 rounded-xl px-4 py-2 border border-gray-200">
            <i class="fas fa-search text-gray-400 mr-2"></i>
            <input type="text" id="searchInput" oninput="searchNow()" placeholder="পণ্য খুঁজুন..." class="bg-transparent w-full outline-none text-sm">
        </div>
    </div>

    <main class="p-4 max-w-lg mx-auto">
        <div class="slider-container shadow-sm mb-6" id="slider"></div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-700">ক্যাটাগরি</h2>
        </div>
        <div class="grid grid-cols-4 gap-3 mb-8">
            <div class="text-center"><div class="bg-white p-4 rounded-2xl shadow-sm mb-1"><i class="fas fa-pen text-orange-500"></i></div><p class="text-[10px]">স্টেশনারি</p></div>
            <div class="text-center"><div class="bg-white p-4 rounded-2xl shadow-sm mb-1"><i class="fas fa-football-ball text-blue-500"></i></div><p class="text-[10px]">স্পোর্টস</p></div>
            <div class="text-center"><div class="bg-white p-4 rounded-2xl shadow-sm mb-1"><i class="fas fa-laptop text-green-500"></i></div><p class="text-[10px]">অফিস</p></div>
            <div class="text-center"><div class="bg-white p-4 rounded-2xl shadow-sm mb-1"><i class="fas fa-vr-cardboard text-purple-500"></i></div><p class="text-[10px]">অন্যান্য</p></div>
        </div>

        <h2 class="font-bold text-gray-700 mb-4">আপনার জন্য পণ্য</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><i class="fas fa-home"></i>নীড়পাতা</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i>মেনু</a>
        <a href="#" class="nav-item"><i class="fas fa-shopping-bag"></i>কার্ট</a>
        <a href="javascript:void(0)" onclick="checkAdmin()" class="nav-item"><i class="fas fa-user-shield"></i>অ্যাডমিন</a>
    </nav>

    <div id="admin-modal" class="fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[30px] p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-orange-600">ম্যানেজ ওয়েবসাইট</h3>
                <button onclick="closeAdmin()" class="text-2xl">&times;</button>
            </div>

            <div class="mb-6 bg-gray-50 p-4 rounded-2xl border">
                <p class="font-bold text-xs mb-2 text-gray-500">স্লাইডার ব্যানার ম্যানেজ</p>
                <input type="file" id="bannerFile" class="text-xs mb-2">
                <button onclick="uploadBanner()" class="w-full bg-orange-600 text-white py-2 rounded-lg text-xs mb-3">নতুন ব্যানার যোগ করুন</button>
                <div id="admin-banner-list" class="space-y-2"></div>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl border">
                <p class="font-bold text-xs mb-2 text-gray-500">নতুন পণ্য যোগ করুন</p>
                <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-2 mb-2 rounded-lg text-sm">
                <input type="number" id="pPrice" placeholder="দাম" class="w-full border p-2 mb-2 rounded-lg text-sm">
                <input type="file" id="pImage" class="text-xs mb-3">
                <button onclick="saveProduct()" class="w-full bg-green-600 text-white py-3 rounded-lg text-sm font-bold">পণ্য সেভ করুন</button>
            </div>
            
            <div id="admin-product-list" class="mt-6 space-y-2">
                </div>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('sonartori_products')) || [];
        let banners = JSON.parse(localStorage.getItem('sonartori_banners')) || [];

        function checkAdmin() {
            if(prompt("পাসওয়ার্ড দিন:") === "1234") {
                document.getElementById('admin-modal').style.display = 'block';
                renderAdminView();
            }
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

        // আপলোড ব্যানার
        function uploadBanner() {
            const file = document.getElementById('bannerFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                banners.push(e.target.result);
                localStorage.setItem('sonartori_banners', JSON.stringify(banners));
                renderAll(); renderAdminView();
            };
            reader.readAsDataURL(file);
        }

        // সেভ প্রোডাক্ট
        function saveProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const file = document.getElementById('pImage').files[0];
            if(!name || !price || !file) return alert("সব তথ্য দিন!");

            const reader = new FileReader();
            reader.onload = (e) => {
                products.push({ id: Date.now(), name, price, img: e.target.result });
                localStorage.setItem('sonartori_products', JSON.stringify(products));
                renderAll(); renderAdminView();
                document.getElementById('pName').value = ""; document.getElementById('pPrice').value = "";
            };
            reader.readAsDataURL(file);
        }

        // ডিলিট সিস্টেম (বাস্তব ও কার্যকরী)
        function removeData(type, indexOrId) {
            if(confirm("আপনি কি এটি মুছে ফেলতে চান?")) {
                if(type === 'banner') {
                    banners.splice(indexOrId, 1);
                    localStorage.setItem('sonartori_banners', JSON.stringify(banners));
                } else {
                    products = products.filter(p => p.id !== indexOrId);
                    localStorage.setItem('sonartori_products', JSON.stringify(products));
                }
                renderAll(); renderAdminView();
            }
        }

        // সার্চ লজিক
        function searchNow() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        function renderAll() {
            const slider = document.getElementById('slider');
            if(banners.length === 0) slider.innerHTML = `<div class="slide active flex items-center justify-center text-gray-400">ব্যানার আপলোড করুন</div>`;
            else {
                slider.innerHTML = banners.map((img, i) => `<div class="slide ${i === 0 ? 'active' : ''}"><img src="${img}"></div>`).join('');
                startSlider();
            }
            displayProducts(products);
        }

        function displayProducts(data) {
            document.getElementById('product-list').innerHTML = data.map(p => `
                <div class="card p-3">
                    <img src="${p.img}" class="w-full h-32 object-contain mb-2">
                    <h3 class="text-[12px] font-bold text-gray-700 h-8 overflow-hidden">${p.name}</h3>
                    <p class="text-orange-600 font-bold text-sm">৳ ${p.price}</p>
                    <a href="https://wa.me/8801923264607?text=অর্ডার: ${p.name}" class="mt-2 block text-center py-2 bg-orange-50 text-orange-600 rounded-lg text-[10px] font-bold border border-orange-100">অর্ডার দিন</a>
                </div>
            `).join('');
        }

        function renderAdminView() {
            // অ্যাডমিন প্যানেলে ব্যানারের লিস্ট
            document.getElementById('admin-banner-list').innerHTML = banners.map((img, i) => `
                <div class="flex justify-between items-center bg-white p-2 border rounded-lg">
                    <span class="text-[10px]">ব্যানার #${i+1}</span>
                    <button onclick="removeData('banner', ${i})" class="text-red-500 text-xs font-bold">মুছুন</button>
                </div>
            `).join('');

            // অ্যাডমিন প্যানেলে প্রোডাক্টের লিস্ট
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div class="flex justify-between items-center bg-white p-2 border rounded-lg">
                    <span class="text-[10px] truncate w-32">${p.name}</span>
                    <button onclick="removeData('product', ${p.id})" class="text-red-500 text-xs font-bold">মুছুন</button>
                </div>
            `).join('');
        }

        let sIndex = 0;
        function startSlider() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length < 2) return;
            setInterval(() => {
                slides[sIndex].classList.remove('active');
                sIndex = (sIndex + 1) % slides.length;
                slides[sIndex].classList.add('active');
            }, 4000);
        }

        window.onload = renderAll;
    </script>
</body>
</html>
