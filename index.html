<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সোনার তরী ডিস্ট্রিবিউশন | Stationery & Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* Mobile Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #f97316; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .nav-item { color: white; text-align: center; font-size: 10px; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

        /* Banner Style */
        .hero-banner { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 15px; }

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .hero-banner { aspect-ratio: 21/7; }
        }

        .category-card { transition: 0.3s; }
        .category-card:hover { transform: translateY(-5px); color: #f97316; }
        
        #admin-modal { display: none; }
    </style>
</head>
<body class="pb-24 md:pb-0">

    <nav class="hidden md:flex bg-white shadow-sm p-4 sticky top-0 z-40 justify-between items-center px-10">
        <h1 class="text-2xl font-bold text-orange-600">সোনার তরী</h1>
        <div class="space-x-6">
            <a href="#" class="hover:text-orange-600">হোম</a>
            <a href="#" class="hover:text-orange-600">পণ্যসমূহ</a>
            <button onclick="openAdmin()" class="bg-orange-600 text-white px-4 py-2 rounded-lg">অ্যাডমিন</button>
        </div>
    </nav>

    <div class="md:hidden flex justify-between items-center p-4 bg-white sticky top-0 z-40 shadow-sm">
        <i class="fas fa-bars text-xl" onclick="alert('মেনু আসছে...')"></i>
        <span class="font-bold text-orange-600">সোনার তরী</span>
        <i class="fas fa-shopping-cart text-xl"></i>
    </div>

    <main class="max-w-7xl mx-auto p-4">
        <section class="mb-8">
            <img src="IMG-20260402-WA0009.jpg" id="hero-img" class="hero-banner shadow-lg" alt="Main Banner">
        </section>

        <h2 class="text-center text-xl font-bold mb-6">Featured Categories</h2>
        <div class="grid grid-cols-3 md:grid-cols-6 gap-4 mb-10">
            <div class="category-card text-center">
                <div class="bg-white p-4 rounded-full shadow-sm mb-2"><i class="fas fa-pen-nib text-orange-500 text-2xl"></i></div>
                <p class="text-sm">স্টেশনারি</p>
            </div>
            <div class="category-card text-center">
                <div class="bg-white p-4 rounded-full shadow-sm mb-2"><i class="fas fa-football-ball text-orange-500 text-2xl"></i></div>
                <p class="text-sm">স্পোর্টস</p>
            </div>
            </div>

        <h2 class="text-xl font-bold mb-6">Top Selling Products</h2>
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <div class="bottom-nav md:hidden">
        <a href="#" class="nav-item"><i class="fas fa-home"></i>HOME</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i>MENU</a>
        <a href="#" class="nav-item"><i class="fas fa-shopping-bag"></i>CART</a>
        <a href="#" class="nav-item"><i class="fas fa-search"></i>SEARCH</a>
        <a href="javascript:void(0)" onclick="openAdmin()" class="nav-item"><i class="fas fa-user"></i>ACCOUNT</a>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-6 rounded-3xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">অ্যাডমিন কন্ট্রোল</h3>
                <button onclick="closeAdmin()" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-500">ব্যানার পরিবর্তন করুন</label>
                    <input type="file" id="banner-input" class="w-full mt-1">
                </div>
                <hr>
                <input type="text" id="p-name" placeholder="পণ্যের নাম" class="w-full border p-3 rounded-xl">
                <input type="number" id="p-price" placeholder="দাম (৳)" class="w-full border p-3 rounded-xl">
                <input type="file" id="p-img" class="w-full">
                <button onclick="saveAll()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">সেভ করুন</button>
            </div>
        </div>
    </div>

    <script>
        function openAdmin() { 
            const pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
            if(pass === "1234") document.getElementById('admin-modal').style.display = 'flex';
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

        function saveAll() {
            const bannerFile = document.getElementById('banner-input').files[0];
            const pName = document.getElementById('p-name').value;
            const pPrice = document.getElementById('p-price').value;
            const pImgFile = document.getElementById('p-img').files[0];

            if(bannerFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('hero_banner', e.target.result);
                    document.getElementById('hero-img').src = e.target.result;
                }
                reader.readAsDataURL(bannerFile);
            }

            if(pName && pPrice && pImgFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const product = { id: Date.now(), name: pName, price: pPrice, img: e.target.result };
                    let products = JSON.parse(localStorage.getItem('my_products')) || [];
                    products.push(product);
                    localStorage.setItem('my_products', JSON.stringify(products));
                    renderProducts();
                }
                reader.readAsDataURL(pImgFile);
            }
            closeAdmin();
        }

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            const products = JSON.parse(localStorage.getItem('my_products')) || [];
            
            products.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                        <img src="${p.img}" class="w-full h-32 object-contain mb-2">
                        <h4 class="text-sm font-semibold h-10 overflow-hidden">${p.name}</h4>
                        <p class="text-orange-600 font-bold mb-2">৳ ${p.price}</p>
                        <a href="https://wa.me/8801923264607?text=আমি এই পণ্যটি কিনতে চাই: ${p.name}" class="block text-center bg-orange-50 text-orange-600 py-2 rounded-lg text-xs font-bold border border-orange-200">অর্ডার করুন</a>
                    </div>
                `;
            });
        }

        // শুরুতে ডেটা লোড করা
        window.onload = () => {
            const savedBanner = localStorage.getItem('hero_banner');
            if(savedBanner) document.getElementById('hero-img').src = savedBanner;
            renderProducts();
        };
    </script>
</body>
</html>
