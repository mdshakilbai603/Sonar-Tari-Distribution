<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সোনার তরী ডিস্ট্রিবিউশন | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        
        /* Cinematic Text Intro */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .intro-text {
            font-size: clamp(2rem, 10vw, 5rem); font-weight: 800;
            background: linear-gradient(to right, #fbbf24, #d97706);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: blur(10px); opacity: 0; transform: scale(0.9);
        }

        /* Hero Banner Style */
        .hero-banner {
            width: 100%; max-height: 500px; object-fit: cover;
            border-radius: 0 0 40px 40px; border-bottom: 2px solid rgba(251, 191, 36, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px;
            transition: 0.4s ease;
        }
        .glass-card:hover { border-color: #fbbf24; transform: translateY(-5px); }
        
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="intro-text" id="logo-text">সোনার তরী ডিস্ট্রিবিউশন</h1>
    </div>

    <div id="wrapper" style="opacity: 0;">
        <div class="relative">
            <img src="IMG-20260402-WA0009.jpg" id="main-banner" class="hero-banner" alt="Main Banner">
            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
            
            <nav class="absolute top-0 w-full p-6 flex justify-between items-center">
                <div class="bg-black/40 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10">
                    <h2 class="text-xl font-bold text-yellow-500">সোনার তরী</h2>
                </div>
                <button onclick="accessAdmin()" class="w-12 h-12 rounded-full bg-yellow-500 text-black shadow-lg flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-plus"></i>
                </button>
            </nav>
        </div>

        <div class="max-w-7xl mx-auto px-6 mt-10">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4 border-b border-white/5 pb-8">
                <div>
                    <h3 class="text-gray-400 uppercase tracking-widest text-xs mb-2">Inventory Management</h3>
                    <h2 class="text-4xl font-bold">মাদারীপুর সদর জোন</h2>
                </div>
                <p class="text-blue-400"><i class="fas fa-phone-alt"></i> ০১৯২৩২৬৪৬০৭</p>
            </div>

            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 py-12">
                </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 z-[11000] bg-black/90 backdrop-blur-2xl p-6 overflow-y-auto">
        <div class="max-w-lg mx-auto bg-slate-900 border border-yellow-500/20 p-8 rounded-[40px]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-yellow-500">Admin Control</h2>
                <button onclick="closeAdmin()" class="text-3xl">&times;</button>
            </div>

            <div class="space-y-6">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-xs text-gray-400 mb-2 uppercase">Update Main Banner</p>
                    <input type="file" id="change-banner" accept="image/*" class="text-sm text-gray-500">
                </div>

                <hr class="border-white/5">

                <p class="text-xs text-gray-400 uppercase">Add New Product</p>
                <div class="border-2 border-dashed border-gray-700 p-6 rounded-2xl text-center relative">
                    <input type="file" id="p-img" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <i class="fas fa-camera text-2xl text-gray-500 mb-2"></i>
                    <p class="text-xs text-gray-500">গ্যালারি থেকে ফটো দিন</p>
                </div>
                <input type="text" id="p-name" placeholder="পণ্যের নাম" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <input type="number" id="p-price" placeholder="দাম (৳)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                
                <button onclick="saveData()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl active:scale-95 transition">সব সেভ করুন</button>
            </div>
        </div>
    </div>

    <script>
        // ইন্ট্রো এনিমেশন
        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#logo-text", { opacity: 1, filter: "blur(0px)", scale: 1, duration: 1.5, ease: "power4.out" })
              .to("#intro-screen", { y: "-100%", duration: 1.2, ease: "expo.inOut", delay: 0.5 })
              .to("#wrapper", { opacity: 1, duration: 0.5 });
            
            initSite();
        };

        function accessAdmin() {
            if(prompt("পাসওয়ার্ড দিন:") === "1234") {
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        // রিয়েল মেমোরি লজিক
        function initSite() {
            // লোড ব্যানার
            const savedBanner = localStorage.getItem('site_banner');
            if(savedBanner) document.getElementById('main-banner').src = savedBanner;

            // লোড প্রোডাক্ট
            const products = JSON.parse(localStorage.getItem('products_db')) || [];
            products.forEach(p => renderItem(p));
        }

        function saveData() {
            const bannerFile = document.getElementById('change-banner').files[0];
            const pFile = document.getElementById('p-img').files[0];
            const pName = document.getElementById('p-name').value;
            const pPrice = document.getElementById('p-price').value;

            // ব্যানার আপডেট
            if(bannerFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('site_banner', e.target.result);
                    document.getElementById('main-banner').src = e.target.result;
                };
                reader.readAsDataURL(bannerFile);
            }

            // নতুন প্রোডাক্ট আপডেট
            if(pFile && pName && pPrice) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const newP = { id: Date.now(), name: pName, price: pPrice, img: e.target.result };
                    const db = JSON.parse(localStorage.getItem('products_db')) || [];
                    db.push(newP);
                    localStorage.setItem('products_db', JSON.stringify(db));
                    renderItem(newP);
                };
                reader.readAsDataURL(pFile);
            }
            
            setTimeout(() => { closeAdmin(); alert("আপডেট সফল হয়েছে!"); }, 500);
        }

        function renderItem(p) {
            const grid = document.getElementById('product-grid');
            const div = document.createElement('div');
            div.className = "glass-card p-4 group relative";
            div.id = `box-${p.id}`;
            div.innerHTML = `
                <button onclick="delItem(${p.id})" class="absolute top-2 right-2 w-8 h-8 bg-red-500 rounded-full opacity-0 group-hover:opacity-100 transition z-20"><i class="fas fa-trash text-xs"></i></button>
                <div class="h-52 bg-white rounded-2xl mb-4 overflow-hidden flex items-center justify-center p-2">
                    <img src="${p.img}" class="max-h-full object-contain">
                </div>
                <h4 class="font-bold text-lg">${p.name}</h4>
                <p class="text-yellow-500 font-black">৳ ${p.price}</p>
                <a href="https://wa.me/8801923264607?text=অর্ডার: ${p.name}" class="mt-4 block text-center py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-yellow-500 hover:text-black transition font-bold">WhatsApp Order</a>
            `;
            grid.appendChild(div);
        }

        function delItem(id) {
            if(confirm("মুছে ফেলতে চান?")) {
                let db = JSON.parse(localStorage.getItem('products_db')) || [];
                db = db.filter(x => x.id !== id);
                localStorage.setItem('products_db', JSON.stringify(db));
                document.getElementById(`box-${id}`).remove();
            }
        }
    </script>
</body>
</html>
